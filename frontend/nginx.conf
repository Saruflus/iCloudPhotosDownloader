# Serves the SPA only. API/WS calls go straight from the browser to the backend
# on :8000 (open CORS), so no reverse-proxying is needed here.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — let the React router handle client routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
