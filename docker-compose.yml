# iCloud → NAS sync. Postgres + Redis are EXISTING/external (set in .env).
# Frontend service is added in build step 11.
services:
  backend:
    build: ./backend
    image: icloud-nas-sync-backend
    container_name: icloud-sync-backend
    restart: unless-stopped
    # No `user:` — the entrypoint starts as root, chowns /config & /downloads to
    # PUID:PGID (default 99:100 = Unraid nobody:users), then drops privileges.
    # Override via PUID/PGID/UMASK in .env if your shares use different ids.
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - /mnt/user/photos:/downloads
      - icloud-config:/config
    healthcheck:
      # python:slim has no curl/wget — stdlib does the probe.
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  celery:
    image: icloud-nas-sync-backend   # reuse the backend image
    build: ./backend
    container_name: icloud-sync-celery
    restart: unless-stopped
    # No `user:` — entrypoint drops to PUID:PGID and sets umask 0002 (dirs 775 /
    # files 664) so the photos are movable/editable over SMB, not just readable.
    command: celery -A app.workers.tasks worker --loglevel=info --concurrency=${DOWNLOAD_CONCURRENCY:-4}
    env_file: .env
    volumes:
      - /mnt/user/photos:/downloads
      - icloud-config:/config
    healthcheck:
      # Pings this worker through the broker; exits non-zero if it's gone.
      test: ["CMD", "celery", "-A", "app.workers.tasks", "inspect", "ping",
             "--timeout", "10"]
      interval: 60s
      timeout: 20s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy

  scheduler:
    image: icloud-nas-sync-backend
    build: ./backend
    container_name: icloud-sync-scheduler
    restart: unless-stopped
    # No `user:` — entrypoint drops to PUID:PGID (default 99:100).
    command: python -m app.scheduler_main
    env_file: .env
    volumes:
      - icloud-config:/config
    healthcheck:
      # The scheduler touches /tmp/scheduler-heartbeat every 30s; stale > 90s = dead.
      test: ["CMD", "python", "-c",
             "import os,sys,time; st=os.stat('/tmp/scheduler-heartbeat'); sys.exit(0 if time.time()-st.st_mtime < 90 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    image: icloud-nas-sync-frontend
    container_name: icloud-sync-frontend
    restart: unless-stopped
    # NOTE: do NOT set `user:` here — nginx needs root to create /var/cache/nginx
    # and bind :80 (it drops privileges for its workers itself).
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    # No backend networking needed: the browser calls the backend directly on
    # :8000 (open CORS). Just serves the static SPA.

volumes:
  icloud-config:
